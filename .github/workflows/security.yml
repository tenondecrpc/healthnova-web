name: Security

on:
  pull_request:
    branches: [main]

permissions:
  pull-requests: write
  contents: read

jobs:
  security-review:
    # NOTE: Requires prepaid API credits at platform.claude.com.
    # The CLAUDE_API_KEY secret uses the Anthropic API (not Claude Pro/Max subscription).
    # OAuth tokens (claude login) do NOT work in CI — only API keys.
    #
    # Known failure modes (job passes green but review is NOT executed):
    #   - "Credit balance is too low" → Load credits at platform.claude.com/settings/billing
    #   - "authentication_error 401"  → Rotate CLAUDE_API_KEY in GitHub Secrets (Settings > Secrets > Actions)
    name: Claude Security Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2

      - uses: anthropics/claude-code-security-review@main
        with:
          comment-pr: true
          upload-results: true
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          claude-model: claude-sonnet-4-6
          exclude-directories: node_modules,.next,coverage,.git
          custom-security-scan-instructions: .github/security-scan-instructions.md

  secret-scan:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.0/gitleaks_8.30.0_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Scan commits in PR
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --verbose \
            --exit-code 1
